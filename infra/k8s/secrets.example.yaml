# SHAPE ONLY — never commit real values.
# Real secrets are created out-of-band (kubectl, sealed-secrets, or external-secrets).
# Real files matching secrets.*.yaml are gitignored (see .gitignore).
apiVersion: v1
kind: Secret
metadata:
  name: forgerise-api
  namespace: forgerise-dev
type: Opaque
stringData:
  ConnectionStrings__Default: "REPLACE_ME"
  Auth__Jwt__SigningKey: "REPLACE_ME"            # ≥64 chars random
  Ai__OpenAi__ApiKey: "REPLACE_ME"
  Ai__AzureOpenAi__ApiKey: "REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: forgerise-web
  namespace: forgerise-dev
type: Opaque
stringData:
  # Web is mostly NEXT_PUBLIC_*, but server-side handlers may need server-only values.
  PLACEHOLDER: "REPLACE_ME"
