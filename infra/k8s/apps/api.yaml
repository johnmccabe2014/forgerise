# ForgeRise API — Deployment + Service.
# Variables substituted by .github/workflows/deploy.yml via `envsubst`:
#   ${NAMESPACE}      forgerise-{dev|staging|prod}
#   ${IMAGE_TAG}      git sha of the build
#   ${IMAGE_REGISTRY} ghcr.io/<owner>/<repo>-api
#   ${REPLICAS}       2 (prod) | 1 (dev/staging)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgerise-api
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: forgerise-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: forgerise
spec:
  replicas: ${REPLICAS}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: forgerise-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgerise-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: forgerise
      annotations:
        forgerise.io/revision: "${IMAGE_TAG}"
    spec:
      automountServiceAccountToken: false
      # GHCR images are private; the secret is created out-of-band by
      # infra/scripts/create-ghcr-pull-secret.sh (once per namespace).
      imagePullSecrets:
        - name: ghcr-credentials
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ${IMAGE_REGISTRY}:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:5080
            - name: Cors__AllowedOrigins
              value: ${WEB_ORIGIN}
            - name: Jwt__Issuer
              value: forgerise
            - name: Jwt__Audience
              value: forgerise.web
          envFrom:
            - secretRef:
                name: forgerise-api
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: forgerise-api
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: forgerise-api
    app.kubernetes.io/part-of: forgerise
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: forgerise-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
