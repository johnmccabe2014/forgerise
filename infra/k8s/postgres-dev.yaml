# Single-replica Postgres 16 for ForgeRise dev. Uses emptyDir — data is
# ephemeral and lost on pod restart. This is acceptable for dev; staging/prod
# must replace this with a managed database or a PVC-backed StatefulSet.
---
apiVersion: v1
kind: Service
metadata:
  name: forgerise-postgres
  namespace: forgerise-dev
  labels:
    app.kubernetes.io/name: forgerise-postgres
    app.kubernetes.io/part-of: forgerise
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: forgerise-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgerise-postgres
  namespace: forgerise-dev
  labels:
    app.kubernetes.io/name: forgerise-postgres
    app.kubernetes.io/part-of: forgerise
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: forgerise-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgerise-postgres
        app.kubernetes.io/part-of: forgerise
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: forgerise
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: forgerise-postgres
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forgerise-postgres
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d forgerise"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d forgerise"]
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
