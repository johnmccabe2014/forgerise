name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1" # Mondays 04:17 UTC

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.7
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # optional; action runs without for OSS

  dependency-scan-web:
    name: dependency scan (web / pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with: { node-version: 20, cache: pnpm, cache-dependency-path: pnpm-lock.yaml }
      - name: Install
        run: pnpm install --frozen-lockfile --filter ./web...
      - name: Audit
        run: pnpm --filter ./web audit --audit-level=high

  dependency-scan-api:
    name: dependency scan (api / dotnet)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25 # v4.1.0
        with: { dotnet-version: 9.0.x }
      - name: List vulnerable packages
        run: |
          if ls *.sln >/dev/null 2>&1; then
            dotnet restore
            dotnet list package --vulnerable --include-transitive | tee vulns.txt
            if grep -E "(High|Critical)" vulns.txt; then exit 1; fi
          else
            echo "skip"
          fi

  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, csharp]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup .NET (csharp only)
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25 # v4.1.0
        with:
          dotnet-version: 9.0.x
      - uses: github/codeql-action/init@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.27.0
        with:
          languages: ${{ matrix.language }}
      - name: Build (csharp only — CodeQL needs compilation)
        if: matrix.language == 'csharp'
        working-directory: api
        run: dotnet build ForgeRise.sln --configuration Release
      - uses: github/codeql-action/analyze@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.27.0
        with:
          category: "/language:${{ matrix.language }}"

  dockerfile-scan:
    name: Dockerfile lint (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Hadolint
        uses: hadolint/hadolint-action@263435318d21b8e681c14492fe198d362a7d2c83 # v3.3.0
        with:
          recursive: true
          ignore: DL3008,DL3018 # apt/apk version pins handled per-image
