name: deploy

# Deploy ForgeRise to k3s via the self-hosted runner.
# Auto-deploys to dev on every successful docker-build (push to main).
# Staging/prod are gated behind workflow_dispatch.

on:
  workflow_run:
    workflows: ["docker-build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, staging, prod]
        default: dev
      image_tag:
        description: "Image tag to deploy (defaults to current main SHA)"
        required: false
        default: ""

permissions:
  contents: read
  packages: read

concurrency:
  # Serialise per environment so two deploys never race on the same namespace.
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  resolve:
    name: resolve target
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      environment: ${{ steps.target.outputs.environment }}
      namespace:   ${{ steps.target.outputs.namespace }}
      host:        ${{ steps.target.outputs.host }}
      replicas:    ${{ steps.target.outputs.replicas }}
      tls_issuer:  ${{ steps.target.outputs.tls_issuer }}
      image_tag:   ${{ steps.target.outputs.image_tag }}
    steps:
      - name: Compute environment + parameters
        id: target
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
            TAG="${{ github.event.inputs.image_tag }}"
            [ -z "$TAG" ] && TAG="${{ github.sha }}"
          else
            ENV="dev"
            TAG="${{ github.event.workflow_run.head_sha }}"
          fi

          case "$ENV" in
            dev)
              NS="forgerise-dev"
              HOST="dev.forgerise.cloudproject.dev"
              REPLICAS="1"
              ;;
            staging)
              NS="forgerise-staging"
              HOST="staging.forgerise.cloudproject.dev"
              REPLICAS="1"
              ;;
            prod)
              NS="forgerise-prod"
              HOST="forgerise.cloudproject.dev"
              REPLICAS="2"
              ;;
            *) echo "::error::unknown environment $ENV"; exit 1 ;;
          esac

          {
            echo "environment=$ENV"
            echo "namespace=$NS"
            echo "host=$HOST"
            echo "replicas=$REPLICAS"
            # Use the ForgeRise-specific issuer that solves HTTP-01 via
            # the traefik IngressClass — public DNS for forgerise.* points
            # at the traefik LB, not the shared nginx one.
            echo "tls_issuer=letsencrypt-prod-traefik"
            echo "image_tag=$TAG"
          } >> "$GITHUB_OUTPUT"

  validate:
    name: validate manifests
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install kubeconform
        run: |
          set -euo pipefail
          curl -sSLo kc.tgz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kc.tgz kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: Render + validate
        env:
          NAMESPACE:          ${{ needs.resolve.outputs.namespace }}
          IMAGE_TAG:          ${{ needs.resolve.outputs.image_tag }}
          REPLICAS:           ${{ needs.resolve.outputs.replicas }}
          PUBLIC_HOST:        ${{ needs.resolve.outputs.host }}
          TLS_ISSUER:         ${{ needs.resolve.outputs.tls_issuer }}
          IMAGE_REGISTRY_API: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api
          IMAGE_REGISTRY_WEB: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web
          API_INTERNAL_URL:   http://forgerise-api.${{ needs.resolve.outputs.namespace }}.svc.cluster.local
          WEB_ORIGIN:         https://${{ needs.resolve.outputs.host }}
        run: |
          set -euo pipefail
          mkdir -p rendered
          IMAGE_REGISTRY="$IMAGE_REGISTRY_API" envsubst < infra/k8s/apps/api.yaml > rendered/api.yaml
          IMAGE_REGISTRY="$IMAGE_REGISTRY_WEB" envsubst < infra/k8s/apps/web.yaml > rendered/web.yaml
          envsubst < infra/k8s/apps/ingress.yaml > rendered/ingress.yaml
          kubeconform -strict -summary -ignore-missing-schemas rendered/

      - name: Upload rendered manifests
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: rendered-manifests-${{ needs.resolve.outputs.environment }}
          path: rendered/
          retention-days: 7

  deploy:
    name: apply (self-hosted k3s)
    needs: [resolve, validate]
    runs-on: [self-hosted, forgerise-k3s]
    env:
      # The runner runs as `john`; /etc/rancher/k3s/k3s.yaml is 0600 root:root.
      # Use the user kubeconfig that points to the external API endpoint.
      KUBECONFIG: /home/john/.kube/config
    environment:
      name: ${{ needs.resolve.outputs.environment }}
      url: https://${{ needs.resolve.outputs.host }}
    steps:
      - name: Download rendered manifests
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: rendered-manifests-${{ needs.resolve.outputs.environment }}
          path: rendered/

      - name: Show plan (kubectl diff)
        env:
          NS: ${{ needs.resolve.outputs.namespace }}
        run: |
          set -euo pipefail
          # diff returns 1 when changes are detected — that's expected.
          kubectl -n "$NS" diff -f rendered/ || true

      - name: Apply
        env:
          NS: ${{ needs.resolve.outputs.namespace }}
        run: |
          set -euo pipefail
          kubectl -n "$NS" apply -f rendered/api.yaml
          kubectl -n "$NS" apply -f rendered/web.yaml
          kubectl -n "$NS" apply -f rendered/ingress.yaml

      - name: Wait for rollouts
        env:
          NS: ${{ needs.resolve.outputs.namespace }}
        run: |
          set -euo pipefail
          kubectl -n "$NS" rollout status deployment/forgerise-api --timeout=180s
          kubectl -n "$NS" rollout status deployment/forgerise-web --timeout=180s

      - name: Smoke tests
        env:
          HOST: ${{ needs.resolve.outputs.host }}
        run: |
          set -euo pipefail
          # Strict TLS verification — the Let's Encrypt cert (issued via
          # cert-manager + ClusterIssuer letsencrypt-prod-traefik) must be
          # valid for ${HOST}.
          #
          # Retry briefly: even after `kubectl rollout status` returns,
          # traefik can take a few seconds to start sending traffic to
          # the new pod, producing transient 502s during cutover.
          # Up to ~2 minutes total: traefik can take a while to fully
          # cut over after pod readiness, especially when the API has
          # just rolled and is still warming up.
          #
          # IMPORTANT: probe and reporting must happen in the same
          # request — earlier versions did one probe loop and then a
          # second `curl` outside the loop to print the status, which
          # raced against the cutover and would 502 even after the
          # loop got a healthy 200. We now print on success from
          # inside the loop and only fail once all attempts fail.
          smoke() {
            local label="$1" url="$2"
            local code
            for attempt in $(seq 1 24); do
              code=$(curl -sS --max-time 10 -o /dev/null -w "%{http_code}" "$url" 2>/dev/null || echo "curl-error")
              if [ "$code" = "200" ]; then
                printf "%s  %s\n" "$label" "$code"
                return 0
              fi
              echo "  attempt $attempt: $url -> $code, retrying..."
              sleep 5
            done
            echo "::error::smoke check failed for $url after 24 attempts (last: $code)"
            return 1
          }

          echo "::group::GET https://${HOST}/"
          smoke "web  " "https://${HOST}/"
          echo "::endgroup::"

          echo "::group::GET https://${HOST}/api/proxy/health"
          # Validates the Next /api/proxy/[...path] handler can reach the API in-cluster.
          smoke "proxy" "https://${HOST}/api/proxy/health"
          echo "::endgroup::"

      - name: On failure — print rollback commands
        if: failure()
        env:
          NS: ${{ needs.resolve.outputs.namespace }}
        run: |
          cat <<EOF
          ::error::Deploy failed. Rollback with:
            kubectl -n ${NS} rollout undo deployment/forgerise-api
            kubectl -n ${NS} rollout undo deployment/forgerise-web
            kubectl -n ${NS} rollout status deployment/forgerise-api
            kubectl -n ${NS} rollout status deployment/forgerise-web
          EOF
