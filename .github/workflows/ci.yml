name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install (skip if web has no package.json yet)
        run: |
          if [ -f package.json ]; then pnpm install --frozen-lockfile; else echo "web/ not scaffolded yet — skipping"; fi

      - name: Lint
        run: |
          if [ -f package.json ]; then pnpm lint; else echo "skip"; fi

      - name: Typecheck
        run: |
          if [ -f package.json ]; then pnpm typecheck; else echo "skip"; fi

      - name: Test
        run: |
          if [ -f package.json ]; then pnpm test -- --run; else echo "skip"; fi

  api:
    name: api (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25 # v4.1.0
        with:
          dotnet-version: 9.0.x

      - name: Restore (skip if no .sln yet)
        run: |
          if ls *.sln >/dev/null 2>&1; then dotnet restore; else echo "api/ not scaffolded yet — skipping"; fi

      - name: Build
        run: |
          if ls *.sln >/dev/null 2>&1; then dotnet build --no-restore --configuration Release; else echo "skip"; fi

      - name: Test
        run: |
          if ls *.sln >/dev/null 2>&1; then dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"; else echo "skip"; fi
